name: my_notes

description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=3.0.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # For ios icons
  cupertino_icons: ^1.0.2

  # For state management
  provider: ^6.0.3

  # For showing toast
  fluttertoast: ^8.1.1

  # For showing animated text
  animated_text_kit: ^4.2.2

  # For firebase services
  firebase_core: ^2.1.1

  # For firebase services
  firebase_auth: ^4.1.1

  # For firebase services
  cloud_firestore: ^4.0.4

  # For firebase services
  firebase_storage: ^11.0.4

  # For finging the paths
  path_provider: ^2.0.11

  # For merging the paths
  path: ^1.8.2

  # For selecting images
  image_picker: ^0.8.6

  # For sharing selected texts
  share_plus: ^6.3.0

  # For state management
  bloc: ^8.1.0

  # For state management
  flutter_bloc: ^8.1.1

  # For comparision
  equatable: ^2.0.5

  # For date formating
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0

  flutter_launcher_icons: "^0.13.1"

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/icon.png"
  windows:
    generate: true
    image_path: "assets/icon/icon.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icon/icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/project.png
    - assets/icon/icon.png

